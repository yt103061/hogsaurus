name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments?teamId=${{ secrets.VERCEL_TEAM_ID }}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "hogsaurus",
              "gitSource": {
                "type": "github",
                "repoId": ${{ secrets.VERCEL_REPO_ID }},
                "ref": "main",
                "sha": "${{ github.sha }}"
              },
              "target": "production"
            }'
